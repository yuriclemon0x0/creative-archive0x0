button{font-family:inherit;}
a{color:inherit;}
*:focus-visible{outline:2px solid var(--color-wine);outline-offset:2px;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:24px;}

.app-header{position:sticky;top:0;z-index:5;background:var(--color-bg);padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(176,144,79,.35);}
.icon-btn{background:none;border:none;font-size:20px;color:var(--color-navy);cursor:pointer;padding:2px 6px;}
.header-title{font-family:'Shippori Mincho',serif;font-size:15px;color:var(--color-navy);letter-spacing:.04em;flex:1;}
.header-edit-btn{margin-left:auto;background:none;border:1px solid rgba(176,144,79,.5);border-radius:6px;font-size:12px;color:var(--color-navy);padding:6px 10px;cursor:pointer;white-space:nowrap;}
.floating-back{position:fixed;left:16px;bottom:18px;width:50px;height:50px;border-radius:50%;background:var(--color-navy);color:#fdf8ec;border:none;font-size:20px;box-shadow:0 4px 12px rgba(0,0,0,.25);z-index:50;display:flex;align-items:center;justify-content:center;padding:0;}
.floating-back.raised{bottom:84px;}
.floating-back:active{transform:translateY(1px);}

.comment-section{text-align:left;margin:18px 2px;}
.comment-list{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.comment-row{display:flex;gap:8px;align-items:flex-start;}
.comment-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--color-gold-light);flex-shrink:0;background:#f1e6cb;}
.comment-avatar-empty{width:34px;height:34px;border-radius:50%;background:#f1e6cb;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--color-text-soft);}
.comment-body{flex:1;min-width:0;position:relative;}
.comment-name{font-size:10.5px;color:var(--color-text-soft);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.comment-bubble{background:#fff;border:1px solid rgba(176,144,79,.35);border-radius:4px 14px 14px 14px;padding:9px 12px;font-size:13px;line-height:1.6;position:relative;}
.comment-delete{background:none;border:none;color:var(--color-text-soft);font-size:11px;cursor:pointer;margin-left:auto;flex-shrink:0;}
.comment-add-form{display:flex;flex-direction:column;gap:8px;background:rgba(176,144,79,.08);border-radius:8px;padding:10px;}
.comment-add-form .row{display:flex;gap:8px;}
.comment-add-form select{flex:0 0 auto;width:auto;}
.comment-add-form textarea{min-height:50px;}

.pairing-card{background:#fffaf0;border:1px solid rgba(176,144,79,.4);border-radius:10px;padding:16px 8px 12px;text-align:center;cursor:pointer;box-shadow:0 2px 5px rgba(80,60,20,.08);}
.pairing-avatars{display:flex;justify-content:center;align-items:center;gap:-8px;}
.pairing-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--color-gold-light);margin:0 -6px;background:#fff;}
.pairing-avatar.empty{display:flex;align-items:center;justify-content:center;background:#f1e6cb;color:var(--color-text-soft);font-size:12px;}
.pairing-title{font-family:'Shippori Mincho',serif;font-size:13.5px;margin-top:8px;color:var(--color-navy);}
.pairing-names{font-size:10.5px;color:var(--color-text-soft);margin-top:2px;font-family:'Cormorant Garamond',serif;font-style:italic;}
.pairing-hero-avatars{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:8px;}
.pairing-avatar-lg{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--color-gold);}
.pairing-avatar-lg.empty{display:flex;align-items:center;justify-content:center;background:#f1e6cb;color:var(--color-text-soft);font-size:12px;}
.pairing-connector{font-size:18px;color:var(--color-rose);}
.pairing-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--color-text-soft);font-size:13.5px;margin:12px 0 4px;}
.pairing-chip-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;}
.cat-filter-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 8px;}

.home-hero{text-align:center;padding:34px 20px 14px;position:relative;}
.doodle-accent{position:absolute;top:6px;right:10px;opacity:.6;pointer-events:none;}
.hero-flourish{display:flex;justify-content:center;margin-bottom:6px;opacity:.85;}
.home-hero h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;letter-spacing:.06em;color:var(--color-navy);margin:4px 0 4px;white-space:nowrap;}
.home-hero p{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--color-text-soft);font-size:12.5px;letter-spacing:.1em;margin:0;}
.cabinet{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:10px 20px 24px;}
.drawer{
  background:#FFFFFF;
  text-align:center;position:relative;cursor:pointer;transition:transform .12s ease;
  padding:18px 10px 14px;
  border:2px solid var(--color-lavender-line);
  border-radius:14px;
  box-shadow:0 4px 10px rgba(126,90,149,.14);
}
.drawer:active{transform:translateY(2px);box-shadow:0 2px 5px rgba(126,90,149,.14);}
.drawer .handle{width:26px;height:9px;border-radius:6px;background:linear-gradient(180deg,#EFE6F5,#D9C6EA);margin:0 auto 10px;box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 1px 2px rgba(126,90,149,.25);}
.drawer .icon{font-size:25px;margin-bottom:6px;display:block;}
.drawer .label{font-family:'Shippori Mincho',serif;font-size:13.5px;color:var(--color-navy);line-height:1.3;}
.drawer .desc{font-size:10px;color:var(--color-text-soft);margin-top:4px;line-height:1.4;}
.home-footer{padding:6px 20px 40px;text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center;}
.home-footer .btn{width:100%;max-width:280px;}
.muted{color:var(--color-text-soft);}
.muted.small{font-size:11px;line-height:1.7;margin-top:8px;}

.list-toolbar{display:flex;gap:8px;padding:12px 16px 6px;align-items:center;}
.list-toolbar input{flex:1;padding:9px 12px;border:1px solid rgba(176,144,79,.5);border-radius:20px;background:#fffdf7;font-size:13px;color:var(--color-text);}
.list-toolbar .btn{white-space:nowrap;border-radius:20px;padding:9px 14px;font-size:12px;}
.tag-chip-row{padding:2px 16px 8px;display:flex;flex-wrap:wrap;gap:4px;}
.chip{display:inline-block;background:rgba(176,144,79,.12);border:1px solid rgba(176,144,79,.4);color:var(--color-wine);border-radius:999px;padding:2px 10px;font-size:11px;margin:2px 3px 2px 0;}
.chip.selectable{cursor:pointer;}
.chip.active{background:var(--color-gold);color:#fff;border-color:var(--color-gold);}

/* ===================== ユーティリティ ===================== */
function esc(s){
  return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function taskProgress(t){
  const steps = (t && t.steps) || [];
  const done = (t && t.completedSteps) || [];
  if(!steps.length) return 0;
  const doneCount = steps.filter(function(s){ return done.indexOf(s.id)!==-1; }).length;
  return Math.round((doneCount / steps.length) * 100);
}
function taskCurrentStepLabel(t){
  const steps = (t && t.steps) || [];
  const done = (t && t.completedSteps) || [];
  const next = steps.filter(function(s){ return done.indexOf(s.id)===-1; })[0];
  return next ? next.label : (steps.length ? '全工程完了' : '工程未設定');
}
function daysUntil(dueDateStr){
  if(!dueDateStr) return null;
  const due = new Date(dueDateStr+'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.ceil((due - today) / 86400000);
}
function taskAccentColor(daysLeft){
  if(daysLeft==null) return {bar:'var(--color-gold)', text:'var(--color-navy)'};
  if(daysLeft<=1) return {bar:'#E0314B', text:'#E0314B'};
  if(daysLeft<=3) return {bar:'#E0529E', text:'#D6469A'};
  return {bar:'var(--color-gold)', text:'var(--color-navy)'};
}
function formatDaysLeft(daysLeft){
  if(daysLeft==null) return '締切未設定';
  if(daysLeft<0) return '締切超過 '+Math.abs(daysLeft)+'日';
  if(daysLeft===0) return '本日締切';
  return 'あと'+daysLeft+'日';
}

function processImage(file, maxDim, quality){
  maxDim = maxDim || 720; quality = quality || 0.78;
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = function(){ reject(new Error('image load failed')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('file read failed')); };
    reader.readAsDataURL(file);
  });
}

/* ===================== ストレージ ===================== */
async function kvGet(key){
  try{ const v = localStorage.getItem(key); return v; }
  catch(e){ return null; }
}
async function kvSet(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){ console.error('save failed', key, e); return false; }
}
async function kvDelete(key){
  try{ localStorage.removeItem(key); }catch(e){}
}
async function kvListKeys(){
  try{
    const keys = [];
    for(let i=0;i<localStorage.length;i++){ keys.push(localStorage.key(i)); }
    return keys;
  }catch(e){ return []; }
}
async function loadJSON(key, fallback){
  const raw = await kvGet(key);
  if(raw==null) return fallback;
  try{ return JSON.parse(raw); }catch(e){ return fallback; }
}
async function saveJSON(key, obj){ return kvSet(key, JSON.stringify(obj)); }

async function loadIndex(collection){ return loadJSON('idx:'+collection, []); }
async function saveIndex(collection, arr){ return saveJSON('idx:'+collection, arr); }
async function loadDetail(collection, id){ return loadJSON('item:'+collection+':'+id, null); }
async function saveDetail(collection, id, obj){ return saveJSON('item:'+collection+':'+id, obj); }
async function deleteDetail(collection, id){ return kvDelete('item:'+collection+':'+id); }

function buildIndexEntry(collection, detail){
  if(collection==='characters'){
    return {id:detail.id, name:detail.name||'', colorTag:detail.colorTag||'', tags:detail.tags||[], image:detail.image||null};
  }
  if(collection==='manga'){
    const cover = (detail.images && detail.images.length) ? detail.images[0] : null;
    return {id:detail.id, title:detail.title||'', date:detail.date||'', tags:detail.tags||[], image:cover, category:detail.category||'', origin:detail.origin||''};
  }
  if(collection==='auNotes'){
    return {id:detail.id, title:detail.title||'', tags:detail.tags||[], linkedCharacterIds:detail.linkedCharacterIds||[]};
  }
  if(collection==='pairings'){
    return {id:detail.id, title:detail.title||'', tags:detail.tags||[], linkedCharacterIds:detail.linkedCharacterIds||[], tagline:detail.tagline||''};
  }
  if(collection==='ideas'){
    return {id:detail.id, title:detail.title||'', tags:detail.tags||[], image:detail.image||null, genre:detail.genre||''};
  }
  if(collection==='tasks'){
    return {

      startDate:detail.startDate||'', dueDate:detail.dueDate||'',

    };
  }
  return {id:detail.id, title:detail.title||'', tags:detail.tags||[], image:detail.image||null};
}

async function renderTaskBanner(){
  const idx = await loadIndex('tasks');
  const active = idx.filter(function(t){ return !t.completed; });
  active.sort(function(a,b){
    const da = a.dueDate ? new Date(a.dueDate) : new Date(8640000000000000);
    const db = b.dueDate ? new Date(b.dueDate) : new Date(8640000000000000);
    return da - db;
  });
  if(!active.length){
    return '<div class="task-banner" data-action="go-folder" data-collection="tasks">'
      + '<div class="task-banner-title">🍒 デイリータスク・進捗管理</div>'
      + '<p class="muted" style="font-size:12.5px;margin:0;">進行中のタスクはありません。新しい制作タスクを登録してみましょう。</p>'
      + '</div>';
  }
  const top = active.slice(0,3);
  const main = top[0];
  const mainDaysLeft = daysUntil(main.dueDate);
  const mainAccent = taskAccentColor(mainDaysLeft);
  const mainPct = taskProgress(main);
  const mainStep = taskCurrentStepLabel(main);
  const restHTML = top.slice(1).map(function(t){
    const daysLeft = daysUntil(t.dueDate);
    const accent = taskAccentColor(daysLeft);
    const pct = taskProgress(t);
    return '<div class="task-banner-mini" data-action="open-entry" data-collection="tasks" data-id="'+t.id+'">'
      + '<span class="task-banner-mini-name">'+esc(t.title)+'</span>'
      + '<span class="task-banner-mini-days" style="color:'+accent.text+'">'+formatDaysLeft(daysLeft)+'</span>'
      + '<div class="progress-bar-track mini"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+accent.bar+'"></div></div>'
      + '</div>';
  }).join('');
  const moreCount = active.length - top.length;
  const moreLine = moreCount>0 ? '<div class="task-banner-more" data-action="go-folder" data-collection="tasks">他 '+moreCount+' 件のタスクを見る ›</div>' : '';
  return '<div class="task-banner">'
    + '<div class="task-banner-title">🍒 デイリータスク・進捗管理</div>'
    + '<div data-action="open-entry" data-collection="tasks" data-id="'+main.id+'" style="cursor:pointer;">'
    +   '<div class="task-banner-name">'+esc(main.title)+'</div>'
    +   '<div class="task-banner-row">'
    +     '<span>工程: '+esc(mainStep)+'</span>'
    +     '<span class="task-banner-days" style="color:'+mainAccent.text+'">'+formatDaysLeft(mainDaysLeft)+'</span>'
    +   '</div>'
    +   '<div class="progress-bar-track"><div class="progress-bar-fill" style="width:'+mainPct+'%;background:'+mainAccent.bar+'"></div></div>'
    +   '<div class="progress-pct">進捗 '+mainPct+'%</div>'
    + '</div>'
    + (restHTML ? '<div class="task-banner-rest">'+restHTML+'</div>' : '')
    + moreLine
    + '</div>';
}

/* ===================== 描画:一覧 ===================== */
function matchesFilter(e, search, tagFilter){
  if(tagFilter && (!e.tags || e.tags.indexOf(tagFilter)===-1)) return false;
  if(state.categoryFilter && e.category !== state.categoryFilter) return false;
  if(state.originFilter && e.origin !== state.originFilter) return false;
  if(state.genreFilter && e.genre !== state.genreFilter) return false;
  if(!search) return true;
  const q = search.trim().toLowerCase();
  if(!q) return true;
  const parts = [];
  if(e.name) parts.push(e.name);
  if(e.title) parts.push(e.title);
  (e.tags||[]).forEach(function(t){ parts.push(t); });
  return parts.join(' ').toLowerCase().indexOf(q) !== -1;
}

function cardHTML(collection, e){
  if(collection==='characters'){
    const palette = COLOR_PALETTE.filter(function(c){ return c.key===e.colorTag; });
    const colorHex = palette.length ? palette[0].hex : 'var(--color-gold)';
    const tagsHTML = (e.tags||[]).slice(0,3).map(function(t){ return '<span class="chip">#'+esc(t)+'</span>'; }).join('');
    return '<div class="char-card" data-action="open-entry" data-collection="characters" data-id="'+e.id+'">'
      + '<div class="locket '+(e.image?'':'empty')+'" style="border-color:'+colorHex+'">'
      +   (e.image ? '<img src="'+e.image+'" alt="'+esc(e.name)+'">' : '<span>No Image</span>')
      + '</div>'
      + '<div class="char-card-name">'+(esc(e.name)||'(名前未設定)')+'</div>'
      + '<div class="char-card-tags">'+tagsHTML+'</div>'
      + '</div>';
  }
  if(collection==='pairings'){
    const charMap = state.charMapCache || {};
    const ids = e.linkedCharacterIds || [];
    const avatars = ids.slice(0,2).map(function(cid){
      const c = charMap[cid];
      if(c && c.image) return '<img class="pairing-avatar" src="'+c.image+'">';
      return '<div class="pairing-avatar empty">?</div>';
    }).join('');
    const namesLine = ids.map(function(cid){ const c=charMap[cid]; return c?esc(c.name):''; }).filter(Boolean).join(' × ');
    return '<div class="pairing-card" data-action="open-entry" data-collection="pairings" data-id="'+e.id+'">'
      + '<div class="pairing-avatars">'+avatars+'</div>'
      + '<div class="pairing-title">'+(esc(e.title)||'(名前未設定)')+'</div>'
      + '<div class="pairing-names">'+namesLine+'</div>'
      + '</div>';
  }
  if(collection==='tasks'){
    const daysLeft = daysUntil(e.dueDate);
    const accent = taskAccentColor(daysLeft);
    const pct = taskProgress(e);
    const sub = [e.category, formatDaysLeft(daysLeft)].filter(Boolean).join(' ・ ');
    return '<div class="entry-card" data-action="open-entry" data-collection="tasks" data-id="'+e.id+'">'
      + '<div class="entry-body" style="width:100%;">'
      +   '<div class="entry-title">'+(e.completed?'✅ ':'')+esc(e.title)+'</div>'
      +   '<div class="entry-sub" style="color:'+accent.text+'">'+esc(sub)+'</div>'
      +   '<div class="task-card-progress"><div class="progress-bar-track"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+accent.bar+'"></div></div></div>'
      + '</div>'
      + '</div>';
  }
  const meta = FOLDER_META[collection];
  const titleText = e.title || '(無題)';
  let subLine = '';
  if(collection==='manga'){
    const sub = [e.category, e.origin, e.date].filter(Boolean).join(' ・ ');
    subLine = sub ? '<div class="entry-sub">'+esc(sub)+'</div>' : '';
  } else if(collection==='ideas' && e.genre){
    subLine = '<div class="entry-sub">'+esc(e.genre)+'</div>';
  }
  const tagsHTML2 = (e.tags||[]).slice(0,4).map(function(t){ return '<span class="chip">#'+esc(t)+'</span>'; }).join('');
  return '<div class="entry-card" data-action="open-entry" data-collection="'+collection+'" data-id="'+e.id+'">'
    + '<div class="entry-thumb">'+(e.image ? '<img src="'+e.image+'" alt="">' : '<span class="thumb-empty">'+meta.icon+'</span>')+'</div>'
    + '<div class="entry-body">'
    +   '<div class="entry-title">'+esc(titleText)+'</div>'
    +   subLine
    +   '<div class="entry-tags">'+tagsHTML2+'</div>'
    + '</div>'
    + '</div>';
}

function renderEntriesGrid(collection){
  const list = state.listCache || [];

    const icon = (FOLDER_META[collection]||{}).icon || '🕊';
    const msg = list.length ? 'あてはまる項目が見つかりません。検索条件を変えてみてください。' : 'まだ何も登録されていません。「＋ 新規追加」から最初の一件を加えましょう。';
    return '<div class="empty-state"><span class="icon">'+icon+'</span>'+msg+'</div>';

function renderImageFieldControl(key, val){
  const preview = val ? '<div class="thumb-item single"><img src="'+val+'"><button type="button" class="thumb-x" data-action="clear-image" data-field="'+key+'">×</button></div>' : '';
  return '<div class="image-field" data-field="'+key+'">'

    + '</div>';
}
function renderImageMultiControl(key, arr){
  arr = arr || [];
  const thumbs = arr.map(function(src,i){
    return '<div class="thumb-item"><img src="'+src+'"><button type="button" class="thumb-x" data-action="remove-multi-image" data-field="'+key+'" data-index="'+i+'">×</button></div>';
  }).join('');
  return '<div class="image-field-multi" data-field="'+key+'">'
    + '<div class="thumb-row">'+thumbs+'</div>'
    + '<label class="btn file-btn">＋画像を追加<input type="file" accept="image/*" multiple data-action-file="multi-image" data-field="'+key+'" hidden></label>'
    + '</div>';
}
function renderLabeledImageRows(key, items){
  items = items || [];
  const rows = items.map(function(c,i){
    return '<div class="costume-row">'
      + '<img src="'+c.image+'" class="costume-thumb">'
      + '<input type="text" class="labeled-image-input" data-field="'+key+'" data-index="'+i+'" value="'+esc(c.label||'')+'" placeholder="名前(普段着など)">'
      + '<button type="button" class="thumb-x" data-action="remove-labeled-image" data-field="'+key+'" data-index="'+i+'">×</button>'
      + '</div>';
  }).join('');
  return '<div class="costume-editor" data-field="'+key+'">'
    + rows
    + '<label class="btn file-btn">＋追加<input type="file" accept="image/*" data-action-file="labeled-image" data-field="'+key+'" hidden></label>'
    + '</div>';
}
function renderField(f, draft){
  const val = draft[f.key];
  if(f.type==='text'){
    return '<div class="field"><label>'+f.label+(f.required?' <span class="req">*</span>':'')+'</label><input type="text" name="field_'+f.key+'" value="'+esc(val||'')+'"></div>';
  }
  if(f.type==='textarea'){
    return '<div class="field"><label>'+f.label+'</label><textarea name="field_'+f.key+'">'+esc(val||'')+'</textarea></div>';
  }
  if(f.type==='date'){
    return '<div class="field"><label>'+f.label+'</label><input type="date" name="field_'+f.key+'" value="'+esc(val||'')+'"></div>';
  }
  if(f.type==='select'){
    const opts = (f.options||[]).map(function(o){ return '<option value="'+esc(o)+'" '+(val===o?'selected':'')+'>'+esc(o)+'</option>'; }).join('');
    return '<div class="field"><label>'+f.label+(f.required?' <span class="req">*</span>':'')+'</label><select name="field_'+f.key+'">'+opts+'</select></div>';
  }
  if(f.type==='image'){
    return '<div class="field"><label>'+f.label+'</label>'+renderImageFieldControl(f.key, val)+'</div>';
  }
  if(f.type==='imageMultiple'){
    return '<div class="field"><label>'+f.label+'</label>'+renderImageMultiControl(f.key, val)+'</div>';
  }
  if(f.type==='labeledImages'){
    return '<div class="field"><label>'+f.label+'</label>'+renderLabeledImageRows(f.key, val)+'</div>';
  }
  return '';
}

function captureFormDraft(){
  const formEl = document.querySelector('.entry-form') || document.querySelector('.character-form') || document.querySelector('.task-form');
  if(!formEl || !state.draft) return;
  formEl.querySelectorAll('input[type=text][name^="field_"], input[type=date][name^="field_"], textarea[name^="field_"], select[name^="field_"]').forEach(function(el){
    const key = el.name.replace('field_','');
    if(key==='tagsRaw') state.draft._tagsRaw = el.value;
    else state.draft[key] = el.value;
  });
  const groups = {};
  formEl.querySelectorAll('input[type=checkbox][name^="field_"]').forEach(function(el){
    const key = el.name.replace('field_','');
    if(!groups[key]) groups[key]=[];
    if(el.checked) groups[key].push(el.value);
  });
  Object.keys(groups).forEach(function(k){ state.draft[k]=groups[k]; });
  formEl.querySelectorAll('.labeled-image-input').forEach(function(el){
    const field = el.dataset.field;
    const i = Number(el.dataset.index);
    if(state.draft[field] && state.draft[field][i]) state.draft[field][i].label = el.value;
  });
  formEl.querySelectorAll('.step-label-input').forEach(function(el){
    const i = Number(el.dataset.index);
    if(state.draft.steps && state.draft.steps[i]) state.draft.steps[i].label = el.value;
  });
}

  try{
    const keys = await kvListKeys();
    const data = {};
    for(let i=0;i<keys.length;i++){
      const raw = await kvGet(keys[i]);
      if(raw!=null) data[keys[i]] = raw;
    }
    const payload = JSON.stringify({exportedAt:new Date().toISOString(), data:data});
    const blob = new Blob([payload], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
    a.href = url; a.download = '創作管理アプリ_backup_'+stamp+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(err){
    console.error(err);
    showToast('バックアップの書き出しに失敗しました。');
  }
}
async function importBackupFile(file){
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    const data = parsed.data || parsed;
    const ok = await showConfirm('バックアップを読み込みます。現在のデータに上書きされる場合があります。続けますか?');
    if(!ok) return;
    const keys = Object.keys(data);
    for(let i=0;i<keys.length;i++){
      await kvSet(keys[i], data[keys[i]]);
    }
    showToast('復元が完了しました。');
    state.view = 'home';
    renderApp();
  }catch(err){
    console.error(err);
    showToast('読み込みに失敗しました。ファイルの形式をご確認ください。');
  }
}

/* ===================== ライトボックス ===================== */
function openLightbox(src){
  if(!src) return;
  const overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  overlay.setAttribute('data-action','close-lightbox');
  overlay.innerHTML = '<img src="'+src+'" alt=""><button class="lightbox-close" data-action="close-lightbox" aria-label="閉じる">×</button>';
  document.body.appendChild(overlay);
}
function closeLightbox(){
  document.querySelectorAll('.lightbox-overlay').forEach(function(el){ el.remove(); });
}

function showConfirm(message){
  return new Promise(function(resolve){
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = ''
      + '<div class="confirm-box">'
      +   '<p>'+esc(message)+'</p>'
      +   '<div class="row">'
      +     '<button type="button" class="btn btn-danger" data-confirm="yes">削除する</button>'
      +     '<button type="button" class="btn" data-confirm="no">やめる</button>'
      +   '</div>'
      + '</div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(ev){
      const btn = ev.target.closest('[data-confirm]');
      if(btn){
        overlay.remove();
        resolve(btn.dataset.confirm==='yes');
      } else if(ev.target===overlay){
        overlay.remove();
        resolve(false);
      }
    });
  });
}

function showToast(message){
  document.querySelectorAll('.app-toast').forEach(function(el){ el.remove(); });
  const el = document.createElement('div');
  el.className = 'app-toast';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 2400);
}

/* ===================== 削除 ===================== */
async function handleDelete(collection, id){
  const ok = await showConfirm('本当に削除しますか?この操作は取り消せません。');
  if(!ok) return;
  if(collection==='characters' || COLLECTIONS[collection]){
    await deleteDetail(collection, id);
    let idx = await loadIndex(collection);
    idx = idx.filter(function(x){ return x.id!==id; });
    await saveIndex(collection, idx);
  }
  state.view = 'list'; state.collection = collection;
  renderApp();
}

/* ===================== メイン描画ディスパッチ ===================== */
async function renderApp(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">読み込み中…</div>';
  let html = '';
  if(state.view==='home') html = await renderHome();
  else if(state.view==='list') html = await renderList(state.collection);
  else if(state.view==='form'){
    html = (state.collection==='tasks') ? await renderTaskForm(state.editId) : await renderForm(state.collection, state.editId);
  }
  else if(state.view==='detail'){
    if(state.collection==='characters') html = await renderCharacterDetail(state.id);
    else if(state.collection==='pairings') html = await renderPairingDetail(state.id);
    else if(state.collection==='tasks') html = await renderTaskDetail(state.id);
    else html = await renderDetail(state.collection, state.id);
  }
  else if(state.view==='todos') html = await renderTodos();
  app.innerHTML = html;
}

/* ===================== イベント処理 ===================== */
async function onAppClick(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  if(action==='go-home'){
    state.draft = null; state.draftFor = null;
    state.view = 'home'; renderApp();
  } else if(action==='go-folder'){
    const key = t.dataset.collection;
    if(key==='todos'){ state.view = 'todos'; state.editingTodoId = null; }
    else { state.view = 'list'; state.collection = key; state.search=''; state.tagFilter=null; state.categoryFilter=null; state.originFilter=null; state.genreFilter=null; }
    renderApp();
  } else if(action==='go-back-list'){
    state.categoryFilter=null; state.originFilter=null; state.genreFilter=null;
    state.view = 'list'; state.collection = t.dataset.collection; renderApp();
  } else if(action==='add-entry'){
    state.draft = null; state.draftFor = null;
    state.view = 'form'; state.collection = t.dataset.collection; state.editId = null; renderApp();
  } else if(action==='edit-entry'){
    state.draft = null; state.draftFor = null;
    state.view = 'form'; state.collection = t.dataset.collection; state.editId = t.dataset.id; renderApp();
  } else if(action==='open-entry'){
    state.view = 'detail'; state.collection = t.dataset.collection; state.id = t.dataset.id; renderApp();
  } else if(action==='cancel-form'){
    state.draft = null; state.draftFor = null;
    state.collection = t.dataset.collection;
    state.view = t.dataset.id ? 'detail' : 'list';
    state.id = t.dataset.id || null;
    renderApp();
  } else if(action==='delete-entry'){
    await handleDelete(t.dataset.collection, t.dataset.id);
  } else if(action==='set-tag-filter'){
    state.tagFilter = (state.tagFilter===t.dataset.tag) ? null : t.dataset.tag;
    updateFilterUI();
  } else if(action==='set-category-filter'){
    state.categoryFilter = (state.categoryFilter===t.dataset.cat) ? null : t.dataset.cat;
    updateFilterUI();
  } else if(action==='set-origin-filter'){
    state.originFilter = (state.originFilter===t.dataset.origin) ? null : t.dataset.origin;
    updateFilterUI();
  } else if(action==='set-genre-filter'){
    state.genreFilter = (state.genreFilter===t.dataset.genre) ? null : t.dataset.genre;
    updateFilterUI();
  } else if(action==='clear-image'){
    captureFormDraft();
    state.draft[t.dataset.field] = null;
    renderApp();
  } else if(action==='remove-multi-image'){
    captureFormDraft();
    state.draft[t.dataset.field].splice(Number(t.dataset.index),1);
    renderApp();
  } else if(action==='remove-labeled-image'){
    captureFormDraft();
    state.draft[t.dataset.field].splice(Number(t.dataset.index),1);
    renderApp();
  } else if(action==='add-step'){
    captureFormDraft();
    const input = document.getElementById('new-step-input');
    const label = input ? input.value.trim() : '';
    if(!label) return;
    if(!state.draft.steps) state.draft.steps = [];
    state.draft.steps.push({id:uid(), label:label});
    renderApp();
  } else if(action==='remove-step'){
    captureFormDraft();
    const removed = state.draft.steps.splice(Number(t.dataset.index),1);
    if(removed && removed[0] && state.draft.completedSteps){
      state.draft.completedSteps = state.draft.completedSteps.filter(function(sid){ return sid!==removed[0].id; });
    }
    renderApp();
  } else if(action==='use-template-steps'){
    captureFormDraft();
    const tmpl = TASK_STEP_TEMPLATES[t.dataset.template] || [];
    state.draft.steps = tmpl.map(function(label){ return {id:uid(), label:label}; });
    renderApp();
  } else if(action==='toggle-task-step'){
    const taskId = t.dataset.id;
    const stepId = t.dataset.step;
    const detail = await loadDetail('tasks', taskId);
    if(!detail) return;
    if(!detail.completedSteps) detail.completedSteps = [];
    const i = detail.completedSteps.indexOf(stepId);
    if(i===-1) detail.completedSteps.push(stepId);
    else detail.completedSteps.splice(i,1);
    detail.completed = (detail.steps && detail.steps.length>0) && detail.completedSteps.length === detail.steps.length;
    await saveDetail('tasks', taskId, detail);
    let idx = await loadIndex('tasks');
    idx = idx.filter(function(x){ return x.id!==taskId; });
    idx.push(buildIndexEntry('tasks', detail));
    await saveIndex('tasks', idx);
    renderApp();
  } else if(action==='open-image'){
    openLightbox(t.dataset.src);
  } else if(action==='export-backup'){
    await exportBackup();
  } else if(action==='toggle-todo'){
    const items = state.todosCache || await loadJSON('idx:todos',[]);
    const found = items.filter(function(x){ return x.id===t.dataset.id; });
    if(found.length){ found[0].done = !found[0].done; await saveJSON('idx:todos', items); state.todosCache = items; renderApp(); }
  } else if(action==='delete-todo'){
    let items = state.todosCache || await loadJSON('idx:todos',[]);
    items = items.filter(function(x){ return x.id!==t.dataset.id; });
    await saveJSON('idx:todos', items); state.todosCache = items; renderApp();
  } else if(action==='delete-comment'){
    const charId = t.dataset.charId;
    const commentId = t.dataset.commentId;
    const detail = await loadDetail('characters', charId);
    if(detail && detail.comments){
      detail.comments = detail.comments.filter(function(c){ return c.id!==commentId; });
      await saveDetail('characters', charId, detail);
      renderApp();
    }
  } else if(action==='edit-todo'){
    state.editingTodoId = t.dataset.id;
    renderApp();
  } else if(action==='cancel-edit-todo'){
    state.editingTodoId = null;
    renderApp();
  }
}

async function onAppSubmit(e){
  const form = e.target;
  if(form.id==='todo-add-form'){
    e.preventDefault();
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if(!text) return;
    const items = state.todosCache || await loadJSON('idx:todos',[]);
    items.push({id:uid(), text:text, done:false});
    await saveJSON('idx:todos', items);
    state.todosCache = items;
    renderApp();
    return;
  }
  if(form.matches('.todo-edit-form')){
    e.preventDefault();
    const id = form.dataset.id;
    const input = form.querySelector('.todo-edit-input');
    const text = input ? input.value.trim() : '';
    if(!text) return;
    const items = state.todosCache || await loadJSON('idx:todos',[]);
    const found = items.filter(function(x){ return x.id===id; });
    if(found.length) found[0].text = text;
    await saveJSON('idx:todos', items);
    state.todosCache = items;
    state.editingTodoId = null;
    renderApp();
    return;
  }
  if(form.id==='comment-add-form'){
    e.preventDefault();
    const charId = form.dataset.charId;
    const select = form.querySelector('select[name="from_character"]');
    const textarea = form.querySelector('textarea[name="comment_text"]');
    const fromCharacterId = select ? select.value : '';
    const text = textarea ? textarea.value.trim() : '';
    if(!fromCharacterId || !text) return;
    const detail = await loadDetail('characters', charId);
    if(!detail) return;
    if(!detail.comments) detail.comments = [];
    detail.comments.push({id:uid(), fromCharacterId:fromCharacterId, text:text});
    await saveDetail('characters', charId, detail);
    renderApp();
    return;
  }
  if(!form.matches('.entry-form, .character-form, .task-form')) return;
  e.preventDefault();
  const collection = form.dataset.collection;
  const editId = form.dataset.id || null;
  captureFormDraft();
  const nameVal = collection==='characters' ? state.draft.name : state.draft.title;
  if(!nameVal || !nameVal.trim()){
    showToast(collection==='characters' ? '名前を入力してください。' : 'タイトルを入力してください。');
    return;
  }
  const id = editId || uid();
  const tagsArr = (state.draft._tagsRaw||'').split(/[#,、\s]+/).map(function(s){ return s.trim(); }).filter(function(s){ return s; });
  const detail = Object.assign({}, state.draft, {id:id, tags:tagsArr});
  delete detail._tagsRaw;
  if(collection==='tasks'){
    if(!detail.completedSteps) detail.completedSteps = [];
    const validStepIds = (detail.steps||[]).map(function(s){ return s.id; });
    detail.completedSteps = detail.completedSteps.filter(function(sid){ return validStepIds.indexOf(sid)!==-1; });
    detail.completed = (detail.steps && detail.steps.length>0) && detail.completedSteps.length === detail.steps.length;
  }
  const ok = await saveDetail(collection, id, detail);
  if(!ok){ showToast('保存に失敗しました。もう一度お試しください。'); return; }
  let idx = await loadIndex(collection);
  idx = idx.filter(function(x){ return x.id!==id; });
  idx.push(buildIndexEntry(collection, detail));
  await saveIndex(collection, idx);
  state.draft = null; state.draftFor = null;
  state.view = 'detail'; state.collection = collection; state.id = id;
  renderApp();
}

async function onAppChange(e){
  const target = e.target;
  if(target.matches('input[type=file][data-action-file="single-image"]')){
    const file = target.files[0]; if(!file) return;
    const dataUrl = await processImage(file);
    captureFormDraft();
    state.draft[target.dataset.field] = dataUrl;
    renderApp();
  } else if(target.matches('input[type=file][data-action-file="multi-image"]')){
    const files = Array.from(target.files||[]);
    captureFormDraft();
    for(let i=0;i<files.length;i++){
      const dataUrl = await processImage(files[i]);
      if(!state.draft[target.dataset.field]) state.draft[target.dataset.field] = [];
      state.draft[target.dataset.field].push(dataUrl);
    }
    renderApp();
  } else if(target.matches('input[type=file][data-action-file="labeled-image"]')){
    const file = target.files[0]; if(!file) return;
    const dataUrl = await processImage(file);
    captureFormDraft();
    const field = target.dataset.field;
    if(!state.draft[field]) state.draft[field] = [];
    state.draft[field].push({label:'', image:dataUrl});
    renderApp();
  } else if(target.matches('input[type=file][data-action-file="import-backup"]')){
    const file = target.files[0];
    if(file) await importBackupFile(file);
  }
}

function onAppInput(e){
  if(e.target.id==='search-input'){
    state.search = e.target.value;
    updateFilterUI();
  }
}

/* ===================== 初期化 ===================== */
function attachGlobalListeners(){
  const app = document.getElementById('app');
  app.addEventListener('click', onAppClick);
  app.addEventListener('submit', onAppSubmit);
  app.addEventListener('change', onAppChange);
  app.addEventListener('input', onAppInput);
  document.body.addEventListener('click', function(e){
    if(e.target.matches('img') && e.target.closest('.lightbox-overlay')) return;
    if(e.target.closest('[data-action="close-lightbox"]')) closeLightbox();
  });
}

window.addEventListener('DOMContentLoaded', async function(){
  attachGlobalListeners();
  if(typeof localStorage === 'undefined'){
    document.getElementById('app').innerHTML = '<div class="empty-state">ストレージ機能が利用できない環境です。Claudeのアーティファクトとして開いてください。</div>';
    return;
  }
  state.view = 'home';
  await renderApp();
});
</script>
