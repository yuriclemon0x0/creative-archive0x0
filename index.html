<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FAF3E6">
<title>創作資料室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --color-bg:#FAF3E6;
  --color-bg-deep:#F0E3C8;
  --color-gold:#B6904F;
  --color-gold-light:#D9BD86;
  --color-rose:#C58E96;
  --color-navy:#37425E;
  --color-wine:#7B3340;
  --color-text:#4A3F35;
  --color-text-soft:#8C7C68;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:'Noto Serif JP',serif;}
body{
  background-image:
    radial-gradient(circle at 15% 8%, rgba(182,144,79,.08), transparent 55%),
    radial-gradient(circle at 85% 92%, rgba(123,51,64,.05), transparent 55%);
  background-attachment:fixed;
}
button{font-family:inherit;}
a{color:inherit;}
*:focus-visible{outline:2px solid var(--color-wine);outline-offset:2px;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:24px;}

.app-header{position:sticky;top:0;z-index:5;background:var(--color-bg);padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(176,144,79,.35);}
.icon-btn{background:none;border:none;font-size:20px;color:var(--color-navy);cursor:pointer;padding:2px 6px;}
.header-title{font-family:'Shippori Mincho',serif;font-size:15px;color:var(--color-navy);letter-spacing:.04em;}

.home-hero{text-align:center;padding:34px 20px 14px;}
.hero-flourish{display:flex;justify-content:center;margin-bottom:6px;opacity:.85;}
.home-hero h1{font-family:'Shippori Mincho',serif;font-size:25px;letter-spacing:.14em;color:var(--color-navy);margin:4px 0 4px;}
.home-hero p{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--color-text-soft);font-size:12.5px;letter-spacing:.1em;margin:0;}
.cabinet{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:10px 20px 24px;}
.drawer{background:linear-gradient(180deg,#efe2c4,#e3d3ab);border:1px solid #c7a96b;border-radius:8px;padding:18px 10px 14px;text-align:center;position:relative;box-shadow:0 3px 0 #b6904f,0 6px 10px rgba(80,60,20,.16);cursor:pointer;transition:transform .12s ease;}
.drawer:active{transform:translateY(2px);box-shadow:0 1px 0 #b6904f,0 3px 6px rgba(80,60,20,.16);}
.drawer .handle{width:26px;height:9px;border-radius:6px;background:linear-gradient(180deg,#f4e3b8,#caa256);margin:0 auto 10px;box-shadow:inset 0 1px 1px rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.3);}
.drawer .icon{font-size:25px;margin-bottom:6px;display:block;}
.drawer .label{font-family:'Shippori Mincho',serif;font-size:13.5px;color:var(--color-navy);line-height:1.3;}
.drawer .desc{font-size:10px;color:var(--color-text-soft);margin-top:4px;line-height:1.4;}
.home-footer{padding:6px 20px 40px;text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center;}
.home-footer .btn{width:100%;max-width:280px;}
.muted{color:var(--color-text-soft);}
.muted.small{font-size:11px;line-height:1.7;margin-top:8px;}

.list-toolbar{display:flex;gap:8px;padding:12px 16px 6px;align-items:center;}
.list-toolbar input{flex:1;padding:9px 12px;border:1px solid rgba(176,144,79,.5);border-radius:20px;background:#fffdf7;font-size:13px;color:var(--color-text);}
.list-toolbar .btn{white-space:nowrap;border-radius:20px;padding:9px 14px;font-size:12px;}
.tag-chip-row{padding:2px 16px 8px;display:flex;flex-wrap:wrap;gap:4px;}
.chip{display:inline-block;background:rgba(176,144,79,.12);border:1px solid rgba(176,144,79,.4);color:var(--color-wine);border-radius:999px;padding:2px 10px;font-size:11px;margin:2px 3px 2px 0;}
.chip.selectable{cursor:pointer;}
.chip.active{background:var(--color-gold);color:#fff;border-color:var(--color-gold);}

.char-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:6px 16px 34px;}
.char-card{background:#fffaf0;border:1px solid rgba(176,144,79,.4);border-radius:10px;padding:16px 8px 10px;text-align:center;cursor:pointer;box-shadow:0 2px 5px rgba(80,60,20,.08);}
.char-card-name{font-family:'Shippori Mincho',serif;font-size:13px;margin-top:8px;color:var(--color-navy);}
.char-card-tags{margin-top:4px;min-height:18px;}

.entry-list{display:flex;flex-direction:column;gap:10px;padding:6px 16px 34px;}
.entry-card{display:flex;gap:12px;background:#fffaf0;border:1px solid rgba(176,144,79,.35);border-radius:10px;padding:10px;cursor:pointer;box-shadow:0 2px 5px rgba(80,60,20,.06);}
.entry-thumb{width:62px;height:62px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#f1e6cb;display:flex;align-items:center;justify-content:center;}
.entry-thumb img{width:100%;height:100%;object-fit:cover;}
.thumb-empty{font-size:22px;opacity:.55;}
.entry-body{flex:1;min-width:0;}
.entry-title{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--color-navy);}
.entry-sub{font-size:11px;color:var(--color-text-soft);margin-top:2px;font-family:'Cormorant Garamond',serif;font-style:italic;}
.entry-tags{margin-top:4px;}
.entry-tags.center{text-align:center;margin:12px 0;}

.empty-state{text-align:center;padding:54px 26px;color:var(--color-text-soft);font-size:13px;line-height:1.8;}
.empty-state .icon{font-size:30px;display:block;margin-bottom:10px;}
.loading{text-align:center;padding:60px 20px;color:var(--color-text-soft);font-style:italic;}

.detail-page{padding:18px 22px 44px;text-align:center;}
.locket{width:120px;height:150px;margin:6px auto 0;border-radius:50%;border:3px solid var(--color-gold);box-shadow:0 0 0 2px var(--color-bg),0 0 0 4px var(--color-gold-light),0 4px 10px rgba(0,0,0,.16);overflow:hidden;background:#fff;position:relative;}
.locket img{width:100%;height:100%;object-fit:cover;}
.locket.empty{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-soft);}
.name-plate{background:linear-gradient(180deg,#f6ecd2,#ecdcb0);border:1px solid var(--color-gold);border-radius:6px;padding:9px 16px;text-align:center;font-family:'Shippori Mincho',serif;font-size:17px;letter-spacing:.06em;color:var(--color-navy);margin:14px auto;max-width:280px;box-shadow:0 2px 4px rgba(0,0,0,.08);}
.detail-sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--color-text-soft);font-size:12px;margin-top:-6px;margin-bottom:10px;}
.detail-image img{max-width:100%;border-radius:10px;border:2px solid var(--color-gold-light);}
.field-block{text-align:left;margin:16px 2px;}
.field-label{font-size:11px;color:var(--color-text-soft);margin-bottom:5px;letter-spacing:.05em;}
.body-text{font-size:13.5px;line-height:1.85;margin:0;}
.detail-actions{display:flex;gap:10px;justify-content:center;margin-top:26px;}
.info-list{text-align:left;margin-top:6px;}
.info-row{display:flex;padding:7px 4px;border-bottom:1px dotted rgba(176,144,79,.55);font-size:13.5px;}
.info-row .k{width:64px;flex-shrink:0;color:var(--color-text-soft);font-size:11.5px;padding-top:2px;}
.info-row .v{flex:1;}
.thumb-row{display:flex;gap:10px;overflow-x:auto;padding:6px 2px;}
.thumb-item{position:relative;flex:0 0 auto;width:74px;}
.thumb-item img{width:74px;height:74px;object-fit:cover;border-radius:8px;border:2px solid var(--color-gold-light);display:block;cursor:pointer;}
.thumb-item.single{width:104px;}
.thumb-item.single img{width:104px;height:104px;cursor:default;}
.thumb-item .cap{font-size:10px;color:var(--color-text-soft);margin-top:3px;text-align:center;}
.thumb-x{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--color-wine);color:#fff;border:none;font-size:12px;line-height:18px;cursor:pointer;padding:0;}

.entry-form,.character-form{padding:16px 20px 56px;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:12px;color:var(--color-text-soft);margin-bottom:5px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.req{color:var(--color-wine);}
input[type=text],input[type=date],textarea,select{width:100%;padding:9px 11px;border:1px solid rgba(176,144,79,.5);border-radius:6px;background:#fffdf7;font-family:'Noto Serif JP',serif;font-size:14px;color:var(--color-text);}
textarea{min-height:80px;resize:vertical;}
.form-actions{display:flex;gap:10px;margin-top:22px;}
.checkbox-list{display:flex;flex-direction:column;gap:5px;max-height:170px;overflow-y:auto;border:1px solid rgba(176,144,79,.3);border-radius:6px;padding:10px;}
.checkbox-row{font-size:13px;display:flex;gap:7px;align-items:center;}
.image-field,.image-field-multi{display:flex;flex-direction:column;gap:9px;}
.file-btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;width:fit-content;}
.costume-editor{display:flex;flex-direction:column;gap:10px;}
.costume-row{display:flex;align-items:center;gap:8px;}
.costume-thumb{width:46px;height:46px;object-fit:cover;border-radius:6px;border:2px solid var(--color-gold-light);flex-shrink:0;}
.costume-row input{flex:1;}

.btn{font-family:'Noto Serif JP',serif;border:1px solid var(--color-gold);background:var(--color-bg);color:var(--color-navy);padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;}
.btn-primary{background:var(--color-navy);color:#fdf8ec;border-color:var(--color-navy);}
.btn-danger{border-color:var(--color-wine);color:var(--color-wine);background:#fff;}

.todo-list{padding:12px 20px;display:flex;flex-direction:column;gap:8px;min-height:120px;}
.todo-row{display:flex;align-items:center;justify-content:space-between;background:#fffaf0;border:1px solid rgba(176,144,79,.3);border-radius:8px;padding:11px 12px;}
.todo-row.done .todo-check span{text-decoration:line-through;color:var(--color-text-soft);}
.todo-check{display:flex;align-items:center;gap:9px;font-size:13.5px;cursor:pointer;}
.todo-check input{width:16px;height:16px;}
.todo-form{display:flex;gap:8px;padding:12px 20px 40px;position:sticky;bottom:0;background:var(--color-bg);}
.todo-form input{flex:1;padding:9px 12px;border:1px solid rgba(176,144,79,.5);border-radius:20px;background:#fffdf7;}

.lightbox-overlay{position:fixed;inset:0;background:rgba(20,15,10,.88);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;}
.lightbox-overlay img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
.lightbox-close{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);border:none;font-size:18px;cursor:pointer;color:var(--color-text);}
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>
<script>
/* ===================== 設定データ ===================== */
const FOLDER_META = {
  characters:{icon:'🎀',label:'キャラクター図鑑',desc:'OC設定・衣装リスト'},
  references:{icon:'🖼',label:'作画資料BOX',desc:'ポーズ・資料画像'},
  auNotes:{icon:'🗝',label:'設定ノート(AU)',desc:'特殊設定・if世界メモ'},
  ideas:{icon:'🪶',label:'ネタ帳',desc:'アイデア・思いつきメモ'},
  todos:{icon:'🔖',label:'やりたいことリスト',desc:'描きたいものチェック'},
  manga:{icon:'🎭',label:'AI漫画展示室',desc:'生成作品ギャラリー'},
};
const FOLDER_ORDER = ['characters','references','auNotes','ideas','todos','manga'];

const COLLECTIONS = {
  references:{ singular:'資料', fields:[
    {key:'title',label:'タイトル',type:'text',required:true},
    {key:'image',label:'画像',type:'image'},
    {key:'memo',label:'メモ',type:'textarea'}
  ]},
  auNotes:{ singular:'設定', fields:[
    {key:'title',label:'タイトル',type:'text',required:true},
    {key:'description',label:'内容',type:'textarea'},
    {key:'linkedCharacterIds',label:'登場キャラクター',type:'characterMultiSelect'}
  ]},
  ideas:{ singular:'ネタ', fields:[
    {key:'title',label:'タイトル',type:'text',required:true},
    {key:'image',label:'画像(任意)',type:'image'},
    {key:'body',label:'メモ',type:'textarea'}
  ]},
  manga:{ singular:'作品', fields:[
    {key:'title',label:'タイトル',type:'text',required:true},
    {key:'date',label:'制作日',type:'date'},
    {key:'images',label:'画像',type:'imageMultiple'},
    {key:'comment',label:'感想・メモ',type:'textarea'}
  ]}
};

const COLOR_PALETTE = [
  {key:'rose',hex:'#C58E96',label:'ローズ'},
  {key:'navy',hex:'#445173',label:'ネイビー'},
  {key:'gold',hex:'#B6904F',label:'ゴールド'},
  {key:'sage',hex:'#8C9B7A',label:'セージ'},
  {key:'wine',hex:'#7B3340',label:'ワイン'},
  {key:'lilac',hex:'#9C8AA5',label:'ライラック'},
  {key:'charcoal',hex:'#5B5048',label:'チャコール'}
];

/* ===================== state ===================== */
const state = {
  view:'home', collection:null, id:null, editId:null,
  search:'', tagFilter:null, listCache:[], todosCache:[],
  draft:null, draftFor:null
};

/* ===================== ユーティリティ ===================== */
function esc(s){
  return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function processImage(file, maxDim, quality){
  maxDim = maxDim || 720; quality = quality || 0.78;
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = function(){ reject(new Error('image load failed')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('file read failed')); };
    reader.readAsDataURL(file);
  });
}

function flourishSVG(){
  return '<svg width="80" height="28" viewBox="0 0 80 28" fill="none"><path d="M2 24 C20 24 26 4 40 4 C54 4 60 24 78 24" stroke="#B6904F" stroke-width="1.2"/><circle cx="40" cy="4" r="2.4" fill="#B6904F"/></svg>';
}

/* ===================== ストレージ ===================== */
async function kvGet(key){
  try{ const v = localStorage.getItem(key); return v; }
  catch(e){ return null; }
}
async function kvSet(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){ console.error('save failed', key, e); return false; }
}
async function kvDelete(key){
  try{ localStorage.removeItem(key); }catch(e){}
}
async function kvListKeys(){
  try{
    const keys = [];
    for(let i=0;i<localStorage.length;i++){ keys.push(localStorage.key(i)); }
    return keys;
  }catch(e){ return []; }
}
async function loadJSON(key, fallback){
  const raw = await kvGet(key);
  if(raw==null) return fallback;
  try{ return JSON.parse(raw); }catch(e){ return fallback; }
}
async function saveJSON(key, obj){ return kvSet(key, JSON.stringify(obj)); }

async function loadIndex(collection){ return loadJSON('idx:'+collection, []); }
async function saveIndex(collection, arr){ return saveJSON('idx:'+collection, arr); }
async function loadDetail(collection, id){ return loadJSON('item:'+collection+':'+id, null); }
async function saveDetail(collection, id, obj){ return saveJSON('item:'+collection+':'+id, obj); }
async function deleteDetail(collection, id){ return kvDelete('item:'+collection+':'+id); }

function buildIndexEntry(collection, detail){
  if(collection==='characters'){
    return {id:detail.id, name:detail.name||'', colorTag:detail.colorTag||'', tags:detail.tags||[], image:detail.image||null};
  }
  if(collection==='manga'){
    const cover = (detail.images && detail.images.length) ? detail.images[0] : null;
    return {id:detail.id, title:detail.title||'', date:detail.date||'', tags:detail.tags||[], image:cover};
  }
  if(collection==='auNotes'){
    return {id:detail.id, title:detail.title||'', tags:detail.tags||[], linkedCharacterIds:detail.linkedCharacterIds||[]};
  }
  return {id:detail.id, title:detail.title||'', tags:detail.tags||[], image:detail.image||null};
}

/* ===================== 描画:ホーム ===================== */
async function renderHome(){
  const tiles = FOLDER_ORDER.map(function(key){
    const c = FOLDER_META[key];
    return '<div class="drawer" data-action="go-folder" data-collection="'+key+'">'
      + '<div class="handle"></div>'
      + '<span class="icon">'+c.icon+'</span>'
      + '<div class="label">'+c.label+'</div>'
      + '<div class="desc">'+c.desc+'</div>'
      + '</div>';
  }).join('');
  return ''
    + '<div class="home-hero">'
    +   '<div class="hero-flourish">'+flourishSVG()+'</div>'
    +   '<h1>創作資料室</h1>'
    +   '<p>Private Atelier Archive</p>'
    + '</div>'
    + '<div class="cabinet">'+tiles+'</div>'
    + '<div class="home-footer">'
    +   '<button class="btn" data-action="export-backup">📤 バックアップを書き出す</button>'
    +   '<label class="btn file-btn">📥 バックアップから復元<input type="file" accept="application/json" data-action-file="import-backup" hidden></label>'
    +   '<p class="muted small">データはこの端末のブラウザ内に保存されます。同じURLを同じブラウザで開いたときだけデータが読み込まれます。機種変更やブラウザの変更の際は、書き出し機能でバックアップを取っておきましょう。</p>'
    + '</div>';
}

/* ===================== 描画:一覧 ===================== */
function matchesFilter(e, search, tagFilter){
  if(tagFilter && (!e.tags || e.tags.indexOf(tagFilter)===-1)) return false;
  if(!search) return true;
  const q = search.trim().toLowerCase();
  if(!q) return true;
  const parts = [];
  if(e.name) parts.push(e.name);
  if(e.title) parts.push(e.title);
  (e.tags||[]).forEach(function(t){ parts.push(t); });
  return parts.join(' ').toLowerCase().indexOf(q) !== -1;
}

function cardHTML(collection, e){
  if(collection==='characters'){
    const palette = COLOR_PALETTE.filter(function(c){ return c.key===e.colorTag; });
    const colorHex = palette.length ? palette[0].hex : 'var(--color-gold)';
    const tagsHTML = (e.tags||[]).slice(0,3).map(function(t){ return '<span class="chip">#'+esc(t)+'</span>'; }).join('');
    return '<div class="char-card" data-action="open-entry" data-collection="characters" data-id="'+e.id+'">'
      + '<div class="locket '+(e.image?'':'empty')+'" style="border-color:'+colorHex+'">'
      +   (e.image ? '<img src="'+e.image+'" alt="'+esc(e.name)+'">' : '<span>No Image</span>')
      + '</div>'
      + '<div class="char-card-name">'+(esc(e.name)||'(名前未設定)')+'</div>'
      + '<div class="char-card-tags">'+tagsHTML+'</div>'
      + '</div>';
  }
  const meta = FOLDER_META[collection];
  const titleText = e.title || '(無題)';
  const subLine = (collection==='manga' && e.date) ? '<div class="entry-sub">'+esc(e.date)+'</div>' : '';
  const tagsHTML2 = (e.tags||[]).slice(0,4).map(function(t){ return '<span class="chip">#'+esc(t)+'</span>'; }).join('');
  return '<div class="entry-card" data-action="open-entry" data-collection="'+collection+'" data-id="'+e.id+'">'
    + '<div class="entry-thumb">'+(e.image ? '<img src="'+e.image+'" alt="">' : '<span class="thumb-empty">'+meta.icon+'</span>')+'</div>'
    + '<div class="entry-body">'
    +   '<div class="entry-title">'+esc(titleText)+'</div>'
    +   subLine
    +   '<div class="entry-tags">'+tagsHTML2+'</div>'
    + '</div>'
    + '</div>';
}

function renderTagChips(allTags){
  if(!allTags.length) return '';
  return '<div class="tag-chip-row">' + allTags.map(function(t){
    return '<span class="chip selectable '+(state.tagFilter===t?'active':'')+'" data-action="set-tag-filter" data-tag="'+esc(t)+'">#'+esc(t)+'</span>';
  }).join('') + '</div>';
}

function renderEntriesGrid(collection){
  const list = state.listCache || [];
  const filtered = list.filter(function(e){ return matchesFilter(e, state.search, state.tagFilter); });
  if(!filtered.length){
    const icon = (FOLDER_META[collection]||{}).icon || '🕊';
    const msg = list.length ? 'あてはまる項目が見つかりません。検索条件を変えてみてください。' : 'まだ何も登録されていません。「＋ 新規追加」から最初の一件を加えましょう。';

function renderField(f, draft){
  const val = draft[f.key];
  if(f.type==='text'){
    return '<div class="field"><label>'+f.label+(f.required?' <span class="req">*</span>':'')+'</label><input type="text" name="field_'+f.key+'" value="'+esc(val||'')+'"></div>';

  if(f.type==='textarea'){
    return '<div class="field"><label>'+f.label+'</label><textarea name="field_'+f.key+'">'+esc(val||'')+'</textarea></div>';
  }
  if(f.type==='date'){
    return '<div class="field"><label>'+f.label+'</label><input type="date" name="field_'+f.key+'" value="'+esc(val||'')+'"></div>';
  }
  if(f.type==='image'){

  }
  if(f.type==='imageMultiple'){

  }
  return '';
}

function captureFormDraft(){
  const formEl = document.querySelector('.entry-form') || document.querySelector('.character-form');
  if(!formEl || !state.draft) return;
  formEl.querySelectorAll('input[type=text][name^="field_"], input[type=date][name^="field_"], textarea[name^="field_"], select[name^="field_"]').forEach(function(el){
    const key = el.name.replace('field_','');
    if(key==='tagsRaw') state.draft._tagsRaw = el.value;
    else state.draft[key] = el.value;
  });
  const groups = {};
  formEl.querySelectorAll('input[type=checkbox][name^="field_"]').forEach(function(el){
    const key = el.name.replace('field_','');
    if(!groups[key]) groups[key]=[];
    if(el.checked) groups[key].push(el.value);
  });
  Object.keys(groups).forEach(function(k){ state.draft[k]=groups[k]; });
  formEl.querySelectorAll('.costume-label-input').forEach(function(el){
    const i = Number(el.dataset.index);
    if(state.draft.costumes && state.draft.costumes[i]) state.draft.costumes[i].label = el.value;
  });
}

/* ===================== バックアップ ===================== */
async function exportBackup(){
  try{
    const keys = await kvListKeys();
    const data = {};
    for(let i=0;i<keys.length;i++){
      const raw = await kvGet(keys[i]);
      if(raw!=null) data[keys[i]] = raw;
    }
    const payload = JSON.stringify({exportedAt:new Date().toISOString(), data:data});
    const blob = new Blob([payload], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
    a.href = url; a.download = '創作管理アプリ_backup_'+stamp+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(err){
    console.error(err);
    alert('バックアップの書き出しに失敗しました。');
  }
}
async function importBackupFile(file){
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    const data = parsed.data || parsed;
    if(!confirm('バックアップを読み込みます。現在のデータに上書きされる場合があります。続けますか?')) return;
    const keys = Object.keys(data);
    for(let i=0;i<keys.length;i++){
      await kvSet(keys[i], data[keys[i]]);
    }
    alert('復元が完了しました。');
    state.view = 'home';
    renderApp();
  }catch(err){
    console.error(err);
    alert('読み込みに失敗しました。ファイルの形式をご確認ください。');
  }
}

/* ===================== 削除 ===================== */
async function handleDelete(collection, id){
  if(!confirm('本当に削除しますか?この操作は取り消せません。')) return;
  if(collection==='characters' || COLLECTIONS[collection]){
    await deleteDetail(collection, id);
    let idx = await loadIndex(collection);
    idx = idx.filter(function(x){ return x.id!==id; });
    await saveIndex(collection, idx);
  }
  state.view = 'list'; state.collection = collection;
  renderApp();
}

/* ===================== メイン描画ディスパッチ ===================== */
async function renderApp(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">読み込み中…</div>';
  let html = '';
  if(state.view==='home') html = await renderHome();
  else if(state.view==='list') html = await renderList(state.collection);
  else if(state.view==='form') html = await renderForm(state.collection, state.editId);
  else if(state.view==='detail') html = (state.collection==='characters') ? await renderCharacterDetail(state.id) : await renderDetail(state.collection, state.id);
  else if(state.view==='todos') html = await renderTodos();
  app.innerHTML = html;
}

/* ===================== イベント処理 ===================== */
async function onAppClick(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  if(action==='go-home'){
    state.draft = null; state.draftFor = null;
    state.view = 'home'; renderApp();
  } else if(action==='go-folder'){
    const key = t.dataset.collection;
    if(key==='todos'){ state.view = 'todos'; }
    else { state.view = 'list'; state.collection = key; state.search=''; state.tagFilter=null; }
    renderApp();
  } else if(action==='go-back-list'){
    state.view = 'list'; state.collection = t.dataset.collection; renderApp();
  } else if(action==='add-entry'){
    state.draft = null; state.draftFor = null;
    state.view = 'form'; state.collection = t.dataset.collection; state.editId = null; renderApp();
  } else if(action==='edit-entry'){
    state.draft = null; state.draftFor = null;
    state.view = 'form'; state.collection = t.dataset.collection; state.editId = t.dataset.id; renderApp();
  } else if(action==='open-entry'){
    state.view = 'detail'; state.collection = t.dataset.collection; state.id = t.dataset.id; renderApp();
  } else if(action==='cancel-form'){
    state.draft = null; state.draftFor = null;
    state.collection = t.dataset.collection;
    state.view = t.dataset.id ? 'detail' : 'list';
    state.id = t.dataset.id || null;
    renderApp();
  } else if(action==='delete-entry'){
    await handleDelete(t.dataset.collection, t.dataset.id);
  } else if(action==='set-tag-filter'){
    state.tagFilter = (state.tagFilter===t.dataset.tag) ? null : t.dataset.tag;
    updateFilterUI();
  } else if(action==='clear-image'){
    captureFormDraft();
    state.draft[t.dataset.field] = null;
    renderApp();
  } else if(action==='remove-multi-image'){
    captureFormDraft();
    state.draft[t.dataset.field].splice(Number(t.dataset.index),1);
    renderApp();
  } else if(action==='remove-costume'){
    captureFormDraft();
    state.draft.costumes.splice(Number(t.dataset.index),1);
    renderApp();
  } else if(action==='open-image'){
    openLightbox(t.dataset.src);
  } else if(action==='export-backup'){
    await exportBackup();
  } else if(action==='toggle-todo'){
    const items = state.todosCache || await loadJSON('idx:todos',[]);
    const found = items.filter(function(x){ return x.id===t.dataset.id; });
    if(found.length){ found[0].done = !found[0].done; await saveJSON('idx:todos', items); state.todosCache = items; renderApp(); }
  } else if(action==='delete-todo'){
    let items = state.todosCache || await loadJSON('idx:todos',[]);
    items = items.filter(function(x){ return x.id!==t.dataset.id; });
    await saveJSON('idx:todos', items); state.todosCache = items; renderApp();
  }
}

async function onAppSubmit(e){
  const form = e.target;
  if(form.id==='todo-add-form'){
    e.preventDefault();
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if(!text) return;
    const items = state.todosCache || await loadJSON('idx:todos',[]);
    items.push({id:uid(), text:text, done:false});
    await saveJSON('idx:todos', items);
    state.todosCache = items;
    renderApp();
    return;
  }
  if(!form.matches('.entry-form, .character-form')) return;
  e.preventDefault();
  const collection = form.dataset.collection;
  const editId = form.dataset.id || null;
  captureFormDraft();
  const nameVal = collection==='characters' ? state.draft.name : state.draft.title;
  if(!nameVal || !nameVal.trim()){
    alert(collection==='characters' ? '名前を入力してください。' : 'タイトルを入力してください。');
    return;
  }
  const id = editId || uid();
  const tagsArr = (state.draft._tagsRaw||'').split(/[,、]/).map(function(s){ return s.trim(); }).filter(function(s){ return s; });
  const detail = Object.assign({}, state.draft, {id:id, tags:tagsArr});
  delete detail._tagsRaw;
  const ok = await saveDetail(collection, id, detail);
  if(!ok){ alert('保存に失敗しました。もう一度お試しください。'); return; }
  let idx = await loadIndex(collection);
  idx = idx.filter(function(x){ return x.id!==id; });
  idx.push(buildIndexEntry(collection, detail));
  await saveIndex(collection, idx);
  state.draft = null; state.draftFor = null;
  state.view = 'detail'; state.collection = collection; state.id = id;
  renderApp();
}

async function onAppChange(e){
  const target = e.target;
  if(target.matches('input[type=file][data-action-file="single-image"]')){
    const file = target.files[0]; if(!file) return;
    const dataUrl = await processImage(file);
    captureFormDraft();
    state.draft[target.dataset.field] = dataUrl;
    renderApp();
  } else if(target.matches('input[type=file][data-action-file="multi-image"]')){
    const files = Array.from(target.files||[]);
    captureFormDraft();
    for(let i=0;i<files.length;i++){
      const dataUrl = await processImage(files[i]);
      if(!state.draft[target.dataset.field]) state.draft[target.dataset.field] = [];
      state.draft[target.dataset.field].push(dataUrl);
    }
    renderApp();
  } else if(target.matches('input[type=file][data-action-file="costume-image"]')){
    const file = target.files[0]; if(!file) return;
    const dataUrl = await processImage(file);
    captureFormDraft();
    if(!state.draft.costumes) state.draft.costumes = [];
    state.draft.costumes.push({label:'', image:dataUrl});
    renderApp();
  } else if(target.matches('input[type=file][data-action-file="import-backup"]')){
    const file = target.files[0];
    if(file) await importBackupFile(file);
  }
}

function onAppInput(e){
  if(e.target.id==='search-input'){
    state.search = e.target.value;
    updateFilterUI();
  }
}

/* ===================== 初期化 ===================== */
function attachGlobalListeners(){
  const app = document.getElementById('app');
  app.addEventListener('click', onAppClick);
  app.addEventListener('submit', onAppSubmit);
  app.addEventListener('change', onAppChange);
  app.addEventListener('input', onAppInput);
  document.body.addEventListener('click', function(e){
    if(e.target.matches('img') && e.target.closest('.lightbox-overlay')) return;
    if(e.target.closest('[data-action="close-lightbox"]')) closeLightbox();
  });
}

window.addEventListener('DOMContentLoaded', async function(){
  attachGlobalListeners();
  if(typeof localStorage === 'undefined'){
    document.getElementById('app').innerHTML = '<div class="empty-state">ストレージ機能が利用できない環境です。Claudeのアーティファクトとして開いてください。</div>';
    return;
  }
  state.view = 'home';
  await renderApp();
});
</script>
